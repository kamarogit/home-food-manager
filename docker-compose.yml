services:
  backend:
    build:
      context: ./backend
    container_name: home-food-backend
    environment:
      - DATABASE_URL=sqlite:////data/food_manager.db
    volumes:
      - backend_data:/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    container_name: home-food-frontend
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:5173"

  mcp_server:
    build:
      context: ./mcp_server
    container_name: home-food-mcp
    environment:
      - API_BASE_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    profiles:
      - mcp
    stdin_open: true
    tty: true

volumes:
  backend_data:
